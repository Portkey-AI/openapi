name: Trigger Mintlify Update

on:
  push:
    branches:
      - master

jobs:
  trigger-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Mintlify Update
        run: |
          curl --request POST \
            --url https://api.mintlify.com/v1/project/update/${{ secrets.MINTLIFY_PROJECT_ID }} \
            --header 'Authorization: Bearer ${{ secrets.MINTLIFY_TOKEN }}'
